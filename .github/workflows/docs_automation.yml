name: Docs Automation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'README.md'
      - 'scripts/docs/normalize_readme.py'
      - '.github/workflows/docs_automation.yml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'scripts/docs/normalize_readme.py'
      - '.github/workflows/docs_automation.yml'

permissions:
  contents: write

concurrency:
  group: docs-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: README standard check
        run: python scripts/docs/normalize_readme.py --check --file README.md
      - name: Refresh CI artifacts inventory
        run: python scripts/ci/list_ci_generated_artifacts.py
      - name: Upload docs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-automation-artifacts
          path: docs/devops/CI_GENERATED_ARTIFACTS.md
