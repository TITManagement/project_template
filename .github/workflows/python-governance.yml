name: Python Governance

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  module-docstrings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check module header docstrings
        run: python .github/scripts/check_module_docstrings.py --root .
